<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos MVVM</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <!--Tabla -->
    <section id="open-table">  
        <div class="container">
            <h1>Lista productos</h1><br>
            <select id="entitySelect" class="form-select">
            <option value="products">Productos</option>
            <option value="users">Usuarios</option>
            <option value="posts">Posts</option>
            <option value="carts">Carritos</option>
            </select>

            <br><br>

            <label>Buscar por ID</label>
            <input id="idFilter" type="text" class="form-control">

            <select id="entitySelect" class="form-select mb-2"></select>

            <table class="table">
                <thead id="table-head"></thead>
                <tbody id="container"></tbody>
            </table>

            <div id="dynamicForm"></div>
        </div>
    </section>

    <!-- Formulario de acutualizacion -->
    <section id="update" style="display: none;">
        <div class="container mt-4">
            <input type="hidden" id="idUpdate">

            <label class="form-label">Title</label>
            <input type="text" class="form-control" id="title">

            <label class="form-label mt-2">Price</label>
            <input type="number" class="form-control" id="price">

            <br>
            <button class="btn btn-success" id="btnSave">Save</button>
        </div>
    </section>
    <script type="module" src="../js/main.js"></script>
</body>
</html>
