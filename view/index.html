<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <section id="open-table">  
        <div class="container">
            <h1>Lista productos</h1><br>
            <button class="btn btn-success" id="btnAddProduct">Add product</button>
            <br><label>Id</label>
            <input id="idFilter" type="text" class="form-control" oninput="getFindByIdProduct()">
            <!-- <p id="Result"></p> -->
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Id</th>
                        <th>Title</th>
                        <th>Price</th>
                        <th>Delete</th>
                        <th>Update</th>
                    </tr>
                </thead>
                <tbody id="container"></tbody>
            </table>
        </div>
    </section>
    <section id="update">
        <div class="mb-3">
            <input type="hidden" id="idUpdate">
            <label class="form-label">Title</label>
            <input type="text" class="form-control" placeholder="Computador" id="title">
            <label class="form-label">Price</label>
            <input type="number" class="form-control" placeholder="Computador" id="price">
            <br>
            <button class="btn btn-success" onclick="updateProduct()">Save</button>
        </div>
    </section>
    <section id="addProduct">





    </section>
    <script src="/js/products.js"></script>
</body>
</html>
